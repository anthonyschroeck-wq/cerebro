<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <!-- Stipple pattern for tattoo texture -->
    <pattern id="stipple" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.4" fill="#2D5A3D" opacity="0.15"/>
      <circle cx="4" cy="4" r="0.3" fill="#2D5A3D" opacity="0.12"/>
      <circle cx="2.5" cy="5" r="0.25" fill="#2D5A3D" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="480" fill="#FAFAF7" rx="0"/>

  <g transform="translate(200, 195)">
    <!-- === CAP STRUCTURE (1.5x scale) === -->
    <g transform="scale(1.5)">
      <!-- Cap crown / dome — main shape -->
      <path d="
        M -95,10
        C -95,-15 -85,-55 -60,-78
        C -35,-101 -5,-112 15,-114
        C 35,-116 65,-108 82,-92
        C 99,-76 108,-52 108,-30
        C 108,-10 105,8 100,18
        L -95,10 Z
      " fill="none" stroke="#2D5A3D" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Crown texture fill -->
      <path d="
        M -95,10
        C -95,-15 -85,-55 -60,-78
        C -35,-101 -5,-112 15,-114
        C 35,-116 65,-108 82,-92
        C 99,-76 108,-52 108,-30
        C 108,-10 105,8 100,18
        L -95,10 Z
      " fill="url(#stipple)"/>

      <!-- Panel seam lines -->
      <path d="M 5,-114 C 8,-80 10,-45 5,12" 
            stroke="#2D5A3D" stroke-width="0.4" stroke-linecap="round" opacity="0.5" fill="none"/>
      <path d="M -45,-95 C -38,-65 -32,-35 -30,12" 
            stroke="#2D5A3D" stroke-width="0.4" stroke-linecap="round" opacity="0.5" fill="none"/>
      <path d="M 58,-103 C 55,-70 50,-38 45,15" 
            stroke="#2D5A3D" stroke-width="0.4" stroke-linecap="round" opacity="0.5" fill="none"/>

      <!-- Top button -->
      <circle cx="8" cy="-114" r="4" fill="none" stroke="#2D5A3D" stroke-width="0.7" opacity="0.7"/>
      <circle cx="8" cy="-114" r="1.5" fill="#2D5A3D" opacity="0.4"/>

      <!-- Brim — curved, front-facing 3/4 view -->
      <path d="
        M -100,10
        C -105,12 -115,18 -118,28
        C -121,38 -112,52 -90,56
        C -60,62 -15,65 30,62
        C 75,59 110,48 125,35
        C 135,26 132,16 120,12
        C 112,10 105,14 100,18
      " fill="none" stroke="#2D5A3D" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Brim underside hint -->
      <path d="
        M -95,14
        C -60,22 -10,28 40,26
        C 70,24 95,20 105,16
      " fill="none" stroke="#2D5A3D" stroke-width="0.35" stroke-linecap="round" opacity="0.35"/>

      <!-- Brim texture -->
      <path d="
        M -100,10 C -105,12 -115,18 -118,28
        C -121,38 -112,52 -90,56
        C -60,62 -15,65 30,62
        C 75,59 110,48 125,35
        C 135,26 132,16 120,12
        C 112,10 105,14 100,18
        L -95,14
        C -60,22 -10,28 40,26
        C 70,24 95,20 105,16
        Z
      " fill="url(#stipple)" opacity="0.6"/>

      <!-- === CEREBRO BRAIN LOGO ON FRONT PANEL === -->
      <g transform="translate(-15, -55)" stroke="#2D5A3D" fill="none" stroke-linecap="round" stroke-linejoin="round">
        
        <!-- Brain outline — stylized C-shape -->
        <path d="
          M 32,-28
          C 24,-35 14,-38 4,-36
          C -8,-34 -18,-26 -22,-16
          C -26,-6 -26,6 -22,16
          C -18,26 -8,33 4,35
          C 14,37 24,34 32,27
        " stroke-width="0.95" opacity="0.9"/>

        <!-- Brain folds / gyri -->
        <path d="M -14,-22 C -6,-18 2,-22 8,-18" stroke-width="0.6" opacity="0.7"/>
        <path d="M -18,-8 C -10,-12 -2,-6 8,-10 C 14,-12 22,-8 28,-12" stroke-width="0.6" opacity="0.7"/>
        <path d="M -18,6 C -10,2 0,8 10,4 C 18,1 24,6 30,2" stroke-width="0.6" opacity="0.7"/>
        <path d="M -14,20 C -6,16 4,22 12,18" stroke-width="0.6" opacity="0.7"/>

        <!-- Neural nodes -->
        <circle cx="-18" cy="-8" r="2" fill="#2D5A3D" opacity="0.6"/>
        <circle cx="8" cy="-18" r="1.8" fill="#2D5A3D" opacity="0.6"/>
        <circle cx="-2" cy="-6" r="1.5" fill="#2D5A3D" opacity="0.5"/>
        <circle cx="10" cy="4" r="2" fill="#2D5A3D" opacity="0.6"/>
        <circle cx="-18" cy="6" r="1.8" fill="#2D5A3D" opacity="0.6"/>
        <circle cx="28" cy="-12" r="1.5" fill="#2D5A3D" opacity="0.5"/>
        <circle cx="30" cy="2" r="1.5" fill="#2D5A3D" opacity="0.5"/>
        <circle cx="4" cy="22" r="1.8" fill="#2D5A3D" opacity="0.5"/>
        <circle cx="-14" cy="20" r="1.5" fill="#2D5A3D" opacity="0.5"/>
        <circle cx="4" cy="-36" r="1.5" fill="#2D5A3D" opacity="0.5"/>

        <!-- Neural connections -->
        <line x1="-18" y1="-8" x2="-2" y2="-6" stroke-width="0.35" opacity="0.35"/>
        <line x1="-2" y1="-6" x2="8" y2="-18" stroke-width="0.35" opacity="0.35"/>
        <line x1="-2" y1="-6" x2="10" y2="4" stroke-width="0.35" opacity="0.35"/>
        <line x1="-18" y1="6" x2="10" y2="4" stroke-width="0.35" opacity="0.35"/>
        <line x1="10" y1="4" x2="28" y2="-12" stroke-width="0.35" opacity="0.35"/>
        <line x1="10" y1="4" x2="30" y2="2" stroke-width="0.35" opacity="0.35"/>
        <line x1="-18" y1="6" x2="-14" y2="20" stroke-width="0.35" opacity="0.35"/>
        <line x1="10" y1="4" x2="4" y2="22" stroke-width="0.35" opacity="0.35"/>
        <line x1="8" y1="-18" x2="4" y2="-36" stroke-width="0.35" opacity="0.35"/>
        <line x1="-18" y1="-8" x2="-18" y2="6" stroke-width="0.35" opacity="0.35"/>
        <line x1="28" y1="-12" x2="30" y2="2" stroke-width="0.35" opacity="0.35"/>

        <!-- Stem / brainstem curl -->
        <path d="M 0,35 C 0,42 -4,48 -2,52" stroke-width="0.75" opacity="0.6"/>
      </g>
    </g>

    <!-- === WORDMARK BELOW (scaled up) === -->
    <text x="10" y="150" 
          font-family="'DM Sans', 'Helvetica Neue', sans-serif" 
          font-size="32" 
          font-weight="500"
          letter-spacing="10"
          text-anchor="middle" 
          fill="#2D5A3D"
          opacity="0.85">CEREBRO</text>

    <!-- Thin rule under wordmark -->
    <line x1="-80" y1="160" x2="100" y2="160" stroke="#2D5A3D" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
